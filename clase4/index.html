<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formularios</title>
</head>
<body>
    <header>
        <h1> Pizzerria Nana</h1>
        <p>Inicie su pedido online</p>
    </header>
    <main>
<!---formulario-->
     <form>
        <section>
         <h2>Datos del cliente</h2>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre">
            <label for="direccion">Direccion</label>
            <input type="text" id="direccion" name="direccion">
            <label for="telefono">Telefono</label>
            <input type="text" id="telefono" name="telefono">
            <label for="email">Email</label>
            <input type="email" id="email" name="email">
        </section>
        <section>
         <h3>Tamaño:</h3>
            <input type="radio" id="chica" name="tamaño" value="chica"> 
            <label for="chica">Chica</label>
            <input type="radio" id="grande" name="tamaño" value="grande"> 
            <label for="grande">Grande</label>
        </section>
        <section>
         <h2>Ingredientes</h2>
            <label for="jamon">Jamon</label>
            <input type="checkbox" id="jamon" name="ingredienteJamon" value="jamon">
            <label for="cebolla">Cebolla</label>
            <input type="checkbox" id="cebolla" name="ingredienteCebolla" value="cebolla">
            <label for="tomate">Tomate</label>
            <input type="checkbox" id="tomate" name="ingredienteTomate" value="tomate">
            <label for="veggie">Veggie</label>
            <input type="checkbox" id="veggie" name="ingredienteVeggie" value="veggie">
        </section>
        <section>
         <label for="masa">Tipo de masa</label>
         <select id="masa" name="masa">
            <option value="delgada">Delgada</option>
            <option value="gruesa">Gruesa</option>
            <option value="integral">Integral</option>
         </select>
        </section>
        <h2>Comentarios</h2>
        <textarea name="comentarios" id="comentarios" rows="4"></textarea>

        <button type="submit">EVIAR PEDIDO</button>
     </form>
    </main>
</body>
</html>
